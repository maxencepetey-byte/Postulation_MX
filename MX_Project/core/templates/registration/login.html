<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MX | Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="login-card">
        <div class="logo-mx">M<span>X</span></div>
        <h5 class="text-center mb-4 text-muted">Connexion au projet</h5>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-mx w-100 py-2">Se connecter</button>
        </form>
        
        <div class="text-center mt-4">
            <span class="small text-muted">Pas de compte ?</span>
            <a href="{% url 'register' %}" class="small text-decoration-none fw-bold"> Créer un compte</a>
        </div>
    </div>
</body>
</html>
